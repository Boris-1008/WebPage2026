<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ex5 按鈕生成和刪除</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">ex#5：按鈕生成和刪除</h1>

    <p class="text-muted">Click the button to make a BUTTON element with text.</p>

    <div class="mb-3">
      <button id="addBtn" class="btn btn-outline-primary me-2">Add it</button>
      <button id="delBtn" class="btn btn-outline-secondary me-2">Del it</button>
    </div>

    <!-- 新按鈕會加在這裡 -->
    <div id="buttonContainer" class="d-flex flex-wrap gap-2"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
